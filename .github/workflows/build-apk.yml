# Build APK workflow for AvfTerminal
#
# Builds debug and release APKs using the Gradle build system and uploads
# them as workflow artifacts. This uses the standalone Gradle setup with
# compile-only stubs for platform APIs (not the AOSP/Soong build).

name: Build APK

on:
  push:
    branches: [master]
    paths:
      - "packages/apps/AvfTerminal/**"
      - ".github/workflows/build-apk.yml"
  pull_request:
    paths:
      - "packages/apps/AvfTerminal/**"
      - ".github/workflows/build-apk.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: packages/apps/AvfTerminal

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('packages/apps/AvfTerminal/**/*.gradle.kts', 'packages/apps/AvfTerminal/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: avfterminal-debug
          path: packages/apps/AvfTerminal/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: avfterminal-release
          path: packages/apps/AvfTerminal/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
